version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -e API_URL -e API_SECRET -e NEXT_PUBLIC_POSTS_URL >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*